#     ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ

source-file ~/.config/tmux/binds.conf

###############################################################################
# Options
###############################################################################
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",*:RGB"

set -g  base-index 1            # start indexing windows at 1, not 0
set -g  detach-on-destroy off   # don't exit tmux when closing session
set -gs escape-time 10          # short delay on esc
set -g  history-limit 50000     # increase from 2000
set -g  renumber-windows on     # renumber all windows when one is closed
set -g  set-clipboard on        # use system clipboard
set -g  status-position top     # move status bar to top (prefer so it doesn't butt up against Neovim's)
set -g  mode-keys vi
set -g  focus-events on
set -g  bell-action none
set -g  mouse on
set -g  display-time 3000
set -g  status-interval 5
set -g  main-pane-width 60% 
set -g  main-pane-height 60% 
set -g  allow-passthrough on

###############################################################################
# Plugins
###############################################################################
set -g @tpm-clean 'U'

set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# set -g @continuum-restore 'on'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "no"
set -g @catppuccin_pane_border_status "off"

# Flat status line built from Catppuccin theme colors rather than plugin modules.
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=#{?client_prefix,#{@thm_red},#{@thm_bg}},fg=#{?client_prefix,#{@thm_bg},#{@thm_green}}]#{?client_prefix,#[bold],} ÓĮą #S #[nobold]"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]‚Ēā"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}] Ó™Ö #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]‚Ēā"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}] Óę∑ #{=/-32/...:#{s|$HOME|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,‚Ēā,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag, Ó≠Ņ zoom ,}"

set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] ůį≠¶ %Y-%m-%d "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]‚Ēā"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] ůįÖź %H:%M "

set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#{?window_zoomed_flag,ÔĒĪ  ,}#W"

# SessionX
set -g @sessionx-fzf-builtin-tmux 'off'
set -g @sessionx-layout 'reverse'
set -g @sessionx-preview-location 'bottom'
set -g @sessionx-ls-command 'eza -lTX --level=1 --icons --color=always --sort=name --group-directories-first'
set -g @sessionx-tmuxinator-mode 'off'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'
set -g @sessionx-additional-options "--color=bg+:-1,bg:#121315"

# run the plugins configs etc.
run '~/.config/tmux/plugins/tpm/tpm'

# Layout styling uses Catppuccin's resolved theme variables after TPM loads the plugin.
set -g status-justify absolute-centre
set -gF status-style "bg=#{@thm_bg},fg=#{@thm_fg}"

setw -g pane-border-status top
setw -g pane-border-format ""
setw -gF pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -gF pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

setw -g automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -gF window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -gF window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -gF window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -gF window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]‚Ēā"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -gF window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
