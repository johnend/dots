###############################################################################
# Keybinds
###############################################################################

# unbind all defaults
unbind -a -T prefix
unbind -a -T root
unbind -a -T copy-mode-vi

# leader
set -g prefix C-s

# navigation
bind -N "Focus pane left" h select-pane -L
bind -N "Focus pane down" j select-pane -D
bind -N "Focus pane up" k select-pane -U
bind -N "Focus pane right" l select-pane -R
bind -N "Jump to last pane" p last-pane

# pane management
bind -N "Split pane vertically" v split-window -h -c '#{pane_current_path}'
bind -N "Split pane horizontally" s split-window -v -c '#{pane_current_path}'
bind -N "Set main-horizontal layout" C-s select-layout main-horizontal
bind -N "Set main-vertical layout" C-v select-layout main-vertical
bind -N "Rotate panes" C-r rotate-window
bind -N "Set tiled layout" C-t select-layout tiled
bind -N "Equalize pane sizes" C-e select-layout -E
bind -N "Kill current pane" C-w kill-pane
bind -N "Toggle pane zoom" z resize-pane -Z
bind -r -N "Resize pane left" H resize-pane -L
bind -r -N "Resize pane down" J resize-pane -D
bind -r -N "Resize pane up" K resize-pane -U
bind -r -N "Resize pane right" L resize-pane -R

# windows
bind -N "Create window at end" t new-window -c '#{pane_current_path}' -a -t '{end}'
bind -N "Create new session" n command-prompt -p "Session name:" "new-session -s '%1'"
bind -N "Rename current session" N command-prompt -p "New session name:" "rename-session %1"

bind -N "Next window" Tab select-window -t:+
bind -N "Previous window" BTab select-window -t:-
bind -N "Rename current window" , command-prompt -I "#W" "rename-window -- '%%'"
bind -N "Kill current window" C-q kill-window
bind -N "Select window 1" 1 select-window -t 1
bind -N "Select window 2" 2 select-window -t 2
bind -N "Select window 3" 3 select-window -t 3
bind -N "Select window 4" 4 select-window -t 4
bind -N "Select window 5" 5 select-window -t 5
bind -N "Select window 6" 6 select-window -t 6
bind -N "Select window 7" 7 select-window -t 7
bind -N "Select window 8" 8 select-window -t 8
bind -N "Select window 9" 9 select-window -t 9

# meta commands
bind -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf
bind -N "Detach client" q detach
bind -N "List noted key bindings" ? list-keys -N
bind -N "Open command prompt" Enter command-prompt
bind -N "Enter copy mode" Space copy-mode

# if selection exists, clear selection, otherwise begin selection
bind -T copy-mode-vi Space    if -F "#{selection_present}" {send -X clear-selection} {send -X begin-selection}

bind -T copy-mode-vi Escape   send -X cancel
bind -T copy-mode-vi k       send -X cursor-up
bind -T copy-mode-vi j     send -X cursor-down
bind -T copy-mode-vi h     send -X cursor-left
bind -T copy-mode-vi l    send -X cursor-right

bind -T copy-mode-vi v        send -X begin-selection

# copies the selection to system clipboard on mac or linux
if "uname | grep -q Darwin" { bind -T copy-mode-vi y send -X copy-pipe 'pbcopy' }
if "uname | grep -q Darwin" { bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy' }
if "uname | grep -q Linux" { bind -T copy-mode-vi y send -X copy-pipe 'wl-copy' }
if "uname | grep -q Linux" { bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'wl-copy' }

# Restore unbound mouse commands
bind -T root MouseDown1Pane { select-pane -t =; send -M }
bind -n MouseDown1Status select-window -t =
bind -n MouseDown3Pane   if -F -t= "#{mouse_any_flag}" { select-pane -t=; send -M } { select-pane -mt= }
bind -n MouseDrag1Pane   if -F -t= "#{mouse_any_flag}" { if -Ft= "#{pane_in_mode}" { copy-mode -M } { send -M } } { copy-mode -M }
bind -n MouseDrag1Border resize-pane -M
bind -n WheelUpPane      if -F -t= "#{mouse_any_flag}" { send -M } { if -Ft= "#{pane_in_mode}" { send -M } { copy-mode -et= } }
bind -n WheelUpStatus    previous-window
bind -n WheelDownStatus  next-window

# Restores unbound copy-mode mouse commands
bind -T copy-mode-vi MouseDown1Pane    select-pane
bind -T copy-mode-vi MouseDrag1Pane    { select-pane; send -X begin-selection }
if "uname | grep -q Darwin" { bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear 'pbcopy' }
if "uname | grep -q Linux" { bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear 'wl-copy' }
bind -T copy-mode-vi WheelUpPane       { select-pane; send -X -N 5 scroll-up }
bind -T copy-mode-vi WheelDownPane     { select-pane; send -X -N 5 scroll-down }
bind -T copy-mode-vi DoubleClick1Pane  { select-pane; send -X select-word }
bind -T copy-mode-vi TripleClick1Pane  { select-pane; send -X select-line }

