backtraces_path = "/path/to/neovide_backtraces.log" # see below for the default platform specific location
fork = false
frame = "none"
idle = true
maximized = false
mouse-cursor-icon = "arrow"
no-multigrid = false
srgb = false
tabs = true
theme = "auto"
title-hidden = true
vsync = true
wsl = false

[font]
normal = [
  "Monaspace Neon Frozen", "Symbols Nerd Font"
] # Will use the bundled Fira Code Nerd Font by default
bold = ["Monaspace Neon Frozen Semibold", "Symbols Nerd Font"]
italic = ["Monaspace Radon Frozen", "Symbols Nerd Font"]
bold_italic = ["Monaspace Radon Frozen Semibold", "Symbols Nerd Font"]
size = 14

[box-drawing]
# "font-glyph", "native" or "selected-native"
mode = "font-glyph"

[box-drawing.sizes]
default = [2, 4] # Thin and thick values respectively, for all sizes
