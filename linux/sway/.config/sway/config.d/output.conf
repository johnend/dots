### Output configuration
#
# Example configuration:
#
# output eDP-1 resolution 2880x1800 position 2880,0 scale 1.5
#
# You can get the names of your outputs by running: swaymsg -t get_outputs
#
# You can also bind workspaces 1,2,3 to specific outputs
#
# workspace 1 output eDP-2
# workspace 2 output HDMI-A-1
# workspace 3 output DP-1
#
# Wacom Tablet - Example
#   input "1386:884:Wacom_Intuos_S_Pad" map_to_output HDMI-A-1
#   input "1386:884:Wacom_Intuos_S_Pen" map_to_output HDMI-A-1
#
#
# Keep only the laptop fallback here. Kanshi owns docked/external layouts so
# Sway doesn't race it with a second static output configuration.
#
# Use the internal panel's identifier instead of eDP-* because the connector
# name has been observed to flip between eDP-1 and eDP-2 across sessions.
output "Apple Computer Inc Color LCD Unknown" resolution 2880x1800 position 0,0 scale 1.5

workspace 1 output DP-3
workspace 2 output HDMI-A-1
workspace 3 output "Apple Computer Inc Color LCD Unknown"
